<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enroll | Energy Centre</title>
  <meta name="description" content="Enroll in your chosen yoga class at Energy Centre with Meenu Somani.">
  <link rel="canonical" href="https://energycentre.example.com/purchase.html">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%231F3A34'/%3E%3Cpath d='M50 78C34 68 26 52 30 34c14 4 26 14 30 30 4-16 16-26 30-30 4 18-4 34-20 44z' fill='%23E8A33D'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header" id="siteHeader">
    <div class="container nav-inner">

      <a href="index.html#home" class="logo" aria-label="Energy Centre home">
        <img src="logo.jpeg" alt="Energy Centre" class="logo-img">
      </a>

      <nav class="main-nav" id="mainNav" aria-label="Primary">
        <ul class="nav-links">
          <li><a href="index.html#home">Home</a></li>
          <li><a href="index.html#about">About</a></li>
          <li><a href="classes.html">Classes</a></li>
          <li><a href="index.html#contact">Contact</a></li>
        </ul>
      </nav>

      <div class="nav-actions">
        <a href="index.html#contact" class="btn btn-primary btn-small">Book Free Trial</a>
        <button class="menu-toggle" id="menuToggle" aria-expanded="false" aria-controls="mainNav" aria-label="Toggle navigation menu">
          <span></span><span></span><span></span>
        </button>
      </div>

    </div>
  </header>

  <main id="main">
    <section class="contact" id="purchase">
      <div class="container">

        <div class="contact-intro">
          <p class="eyebrow">Enroll Now</p>
          <h2 class="section-heading">
            Selected Course:<br>
            <span id="courseNameDisplay">—</span>
          </h2>
          <p class="contact-desc">
            Fill in your details below and Meenu's team will confirm your enrollment shortly.
          </p>
        </div>

        <div class="booking-card">
          <form class="booking-form" id="purchaseForm" novalidate>

            <div class="form-row">
              <div class="form-field">
                <label for="pFullName">Full Name <span class="req">*</span></label>
                <input type="text" id="pFullName" name="fullName" autocomplete="name" placeholder="e.g. Priya Sharma">
                <span class="field-error" id="pFullNameError" role="alert"></span>
              </div>

              <div class="form-field">
                <label for="pMobile">Mobile Number <span class="req">*</span></label>
                <input type="tel" id="pMobile" name="mobile" autocomplete="tel" placeholder="e.g. 98765 43210" inputmode="tel">
                <span class="field-error" id="pMobileError" role="alert"></span>
              </div>
            </div>

            <div class="form-row">
              <div class="form-field">
                <label for="pEmail">Email</label>
                <input type="email" id="pEmail" name="email" autocomplete="email" placeholder="you@example.com">
                <span class="field-error" id="pEmailError" role="alert"></span>
              </div>

              <div class="form-field">
                <label for="pAge">Age</label>
                <input type="number" id="pAge" name="age" min="5" max="100" placeholder="e.g. 32" inputmode="numeric">
                <span class="field-error" id="pAgeError" role="alert"></span>
              </div>
            </div>

            <div class="form-row">
              <div class="form-field">
                <label for="pGender">Gender</label>
                <select id="pGender" name="gender">
                  <option value="" selected disabled>Select</option>
                  <option value="Female">Female</option>
                  <option value="Male">Male</option>
                  <option value="Prefer not to say">Prefer not to say</option>
                </select>
              </div>

              <div class="form-field">
                <label for="pExperience">Previous Yoga Experience</label>
                <select id="pExperience" name="experience">
                  <option value="" selected disabled>Select</option>
                  <option value="None">None</option>
                  <option value="Beginner">Beginner</option>
                  <option value="Intermediate">Intermediate</option>
                  <option value="Advanced">Advanced</option>
                </select>
              </div>
            </div>

            <div class="form-field form-field-full">
              <span class="pill-group-label">Preferred Batch</span>
              <div class="pill-radio-group" role="radiogroup" aria-label="Preferred Batch">
                <input type="radio" id="pBatchMorning" name="preferredTime" value="Morning" class="pill-radio-input">
                <label for="pBatchMorning" class="pill-radio-label">Morning</label>

                <input type="radio" id="pBatchEvening" name="preferredTime" value="Evening" class="pill-radio-input">
                <label for="pBatchEvening" class="pill-radio-label">Evening</label>
              </div>
            </div>

            <div class="form-field form-field-full">
              <label for="pMedicalNotes">Medical Notes</label>
              <textarea id="pMedicalNotes" name="medicalNotes" rows="3" placeholder="Any injuries, conditions, or notes Meenu should know about"></textarea>
            </div>

            <input type="hidden" id="pCourse" name="course" value="">

            <div class="form-status" id="pFormStatus" role="status" aria-live="polite"></div>

            <button type="submit" class="btn btn-primary btn-submit" id="pSubmitBtn">
              <span class="btn-text">Enroll Now</span>
              <span class="btn-spinner" aria-hidden="true"></span>
            </button>

          </form>
        </div>

      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
